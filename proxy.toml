[server]
listen = "0.0.0.0:8443"
cert = "./certs/cert.pem"
key = "./certs/key.pem"
metrics_listen = "127.0.0.1:9090"
https_listen = "0.0.0.0:8444"  # HTTPS fallback with Alt-Svc

# Optional — defaults are production-safe; tune for your SLAs
# [server.limits]
# upstream_connect_timeout_secs = 10
# upstream_request_timeout_secs = 120
# max_request_body_bytes = 10485760
# max_upstream_response_body_bytes = 52428800
# max_idle_connections_per_upstream = 16
# graceful_shutdown_secs = 30

[[routes]]
match = "*"
# Single upstream
upstream = "example.com:80"

# Or multiple upstreams for load balancing:
# upstreams = ["server1.example.com:80", "server2.example.com:80"]
